zabbix_export:
  version: '7.0'
  template_groups:
  - uuid: bd327ca2dab24c4aa6ba757655aa052f
    name: Templates/Applications
  templates:
  - uuid: 483df00fdd294bffb2628db7db98c963
    template: Kerio Connect by Script
    name: Kerio Connect by Script
    description: |-
      Monitors Kerio Connect mail server via its JSON-RPC Admin API.
      Zabbix server/proxy calls the API directly — no agent required.

      CPU, memory, swap, and per-domain metrics are intentionally omitted —
      the underlying API methods are not available to the Auditor role.
      For OS-level metrics, link a Windows/Linux OS template alongside.

      Version: 1.0.0
      Author:  Konstantin Tyutyunnik (Константин Тютюнник)
      Site:    https://itforprof.com
    groups:
    - name: Templates/Applications
    macros:
    - macro: '{$KERIO.API.SCHEME}'
      value: https
    - macro: '{$KERIO.API.HOST}'
      value: <SET KERIO HOST>
    - macro: '{$KERIO.API.PORT}'
      value: '4040'
    - macro: '{$KERIO.API.USERNAME}'
      value: admin
    - macro: '{$KERIO.API.PASSWORD}'
      value: ''
      type: SECRET_TEXT
    - macro: '{$KERIO.QUEUE.WARN}'
      value: '100'
    - macro: '{$KERIO.DISK.WARN}'
      value: '80'
      description: Disk usage warning threshold (percent).
    - macro: '{$KERIO.DISK.AVG}'
      value: '90'
      description: Disk usage average severity threshold (percent).
    - macro: '{$KERIO.DISK.HIGH}'
      value: '95'
      description: Disk usage critical threshold (percent).
    - macro: '{$KERIO.DISK.DISASTER}'
      value: '99'
      description: Disk usage disaster threshold (percent). Above this, Kerio stops accepting mail.
    - macro: '{$KERIO.SMTP.AUTH.WARN}'
      value: '1'
      description: SMTP auth-failure rate threshold (failures/s, 5-minute average). 1/s sustained = 300 attempts/5 min.
    - macro: '{$KERIO.SERVICES.EXCLUDE}'
      value: ^$
      description: 'Regex matched against discovered service names; matching services are excluded from monitoring. Default ^$ matches nothing (everything is monitored). Note: the regex is anchored, so Secure variants must be listed separately. Example: ^(POP3|HTTP|XMPP|NNTP|Secure NNTP|Secure XMPP)$'
    tags:
    - tag: class
      value: application
    - tag: target
      value: kerio-connect
    items:
    - uuid: b94f11060a9e404eb1429357b7ada235
      name: 'Kerio Connect: Get API data'
      type: SCRIPT
      key: kerio.api.master
      delay: 1m
      history: 1h
      trends: '0'
      timeout: 30s
      value_type: TEXT
      description: 'Master item. Calls Kerio Connect JSON-RPC API and returns a JSON blob

        with four top-level keys: statistics, services, license, server.

        All other items derive from this via JSONPath. See docs/api_fields.md

        for the contract.

        '
      parameters:
      - name: host
        value: '{$KERIO.API.HOST}'
      - name: port
        value: '{$KERIO.API.PORT}'
      - name: scheme
        value: '{$KERIO.API.SCHEME}'
      - name: username
        value: '{$KERIO.API.USERNAME}'
      - name: password
        value: '{$KERIO.API.PASSWORD}'
      params: |
        // master_collector.js - Zabbix Script item (Duktape engine)
        var params = JSON.parse(value);
        var baseUrl = params.scheme + '://' + params.host + ':' + params.port + '/admin/api/jsonrpc/';
        var reqId = 0;
        var token = null;
        var cookie = null;

        function apiCall(method, callParams) {
            reqId++;
            var body = { jsonrpc: '2.0', id: reqId, method: method };
            if (callParams) body.params = callParams;
            if (token) body.token = token;

            var http = new HttpRequest();
            http.addHeader('Content-Type: application/json');
            http.addHeader('Accept: application/json');
            if (cookie) http.addHeader('Cookie: ' + cookie);
            if (token) http.addHeader('X-Token: ' + token);

            var resp = http.post(baseUrl, JSON.stringify(body));
            var status = http.getStatus();
            if (status < 200 || status >= 300) throw 'HTTP ' + status + ' on ' + method;

            var result = JSON.parse(resp);
            if (result.error) throw method + ' error: ' + result.error.message;
            if (method === 'Session.login') {
                var headers = http.getHeaders ? http.getHeaders() : {};
                var sc = headers['set-cookie'] || headers['Set-Cookie'] || '';
                if (sc) cookie = sc.split(';')[0];
            }
            return result.result;
        }

        try {
            var loginResult = apiCall('Session.login', {
                userName: params.username,
                password: params.password,
                application: { name: 'Zabbix Monitoring', vendor: 'Zabbix', version: '7.0' }
            });
            token = loginResult.token;

            var statsResp = apiCall('Statistics.get');
            var svcsResp = apiCall('Services.get');
            var licResp = apiCall('ProductRegistration.getFullStatus');
            var serverResp = apiCall('Server.getVersion');

            try { apiCall('Session.logout'); } catch (e) {}
            token = null;
            cookie = null;

            return JSON.stringify({
                statistics: statsResp.statistics || {},
                services: svcsResp.services || [],
                license: licResp.status || {},
                server: serverResp || {}
            });
        } catch (e) {
            try { apiCall('Session.logout'); } catch (x) {}
            throw e;
        }
      tags:
      - tag: component
        value: raw
      triggers:
      - uuid: ae548683018b4d57ba5218f36225a1fd
        expression: nodata(/Kerio Connect by Script/kerio.api.master,5m)=1
        name: 'Kerio Connect: API data collection failed'
        priority: AVERAGE
        manual_close: 'YES'
        description: The master item has not returned data for 5 minutes. Check network access to Kerio port 4040 and API credentials.
    - uuid: b3c9958971e84b3cb7b0686b99284db9
      name: 'Kerio Connect: Disk used'
      type: DEPENDENT
      key: kerio.disk.used
      delay: '0'
      units: MB
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.statistics.storage.occupied.value
      tags:
      - tag: component
        value: storage
    - uuid: 2b9a03c817f142e286d53c93a8298175
      name: 'Kerio Connect: Disk total'
      type: DEPENDENT
      key: kerio.disk.total
      delay: '0'
      units: MB
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.statistics.storage.total.value
      tags:
      - tag: component
        value: storage
    - uuid: 011a196ea05d4251a1451e675cce7d1a
      name: 'Kerio Connect: Disk used %'
      type: DEPENDENT
      key: kerio.disk.pct
      delay: '0'
      value_type: FLOAT
      units: '%'
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.statistics.storage.percentage
      - type: REGEX
        parameters:
        - (\d+(?:\.\d+)?)
        - \1
      tags:
      - tag: component
        value: storage
      triggers:
      - uuid: b2812e40b44348ab9698a6fdaa6020df
        expression: last(/Kerio Connect by Script/kerio.disk.pct)>{$KERIO.DISK.WARN}
        name: 'Kerio Connect: Disk usage > {$KERIO.DISK.WARN}%'
        priority: WARNING
        description: 'Mail store disk usage exceeded {$KERIO.DISK.WARN}% (current: {ITEM.VALUE1}%). Free space before mailboxes stop accepting messages.'
        dependencies:
        - &id001
          name: 'Kerio Connect: API data collection failed'
          expression: nodata(/Kerio Connect by Script/kerio.api.master,5m)=1
        - &id002
          name: 'Kerio Connect: Disk usage > {$KERIO.DISK.AVG}%'
          expression: last(/Kerio Connect by Script/kerio.disk.pct)>{$KERIO.DISK.AVG}
        - &id003
          name: 'Kerio Connect: Disk usage > {$KERIO.DISK.HIGH}%'
          expression: last(/Kerio Connect by Script/kerio.disk.pct)>{$KERIO.DISK.HIGH}
        - &id004
          name: 'Kerio Connect: Disk usage > {$KERIO.DISK.DISASTER}%'
          expression: last(/Kerio Connect by Script/kerio.disk.pct)>{$KERIO.DISK.DISASTER}
      - uuid: ea637b0951d54d7bba2c5300a4b396e1
        expression: last(/Kerio Connect by Script/kerio.disk.pct)>{$KERIO.DISK.AVG}
        name: 'Kerio Connect: Disk usage > {$KERIO.DISK.AVG}%'
        priority: AVERAGE
        description: 'Mail store disk usage exceeded {$KERIO.DISK.AVG}% (current: {ITEM.VALUE1}%). Plan capacity — the next escalation is High at {$KERIO.DISK.HIGH}%.'
        dependencies:
        - *id001
        - *id003
        - *id004
      - uuid: b089dadc82e94e029386064331ca532f
        expression: last(/Kerio Connect by Script/kerio.disk.pct)>{$KERIO.DISK.HIGH}
        name: 'Kerio Connect: Disk usage > {$KERIO.DISK.HIGH}%'
        priority: HIGH
        description: 'Mail store disk usage exceeded {$KERIO.DISK.HIGH}% (current: {ITEM.VALUE1}%). Mailboxes will stop accepting messages soon — free space immediately.'
        dependencies:
        - *id001
        - *id004
      - uuid: e39af3fbb3fe438c92526d91984adc66
        expression: last(/Kerio Connect by Script/kerio.disk.pct)>{$KERIO.DISK.DISASTER}
        name: 'Kerio Connect: Disk usage > {$KERIO.DISK.DISASTER}%'
        priority: DISASTER
        description: 'Mail store disk usage exceeded {$KERIO.DISK.DISASTER}% (current: {ITEM.VALUE1}%). Kerio Connect stops accepting messages at full disk — free space NOW.'
        dependencies:
        - *id001
    - uuid: d27d5bc1c9df493faac549e1da14f4af
      name: 'Kerio Connect: Queue total'
      type: DEPENDENT
      key: kerio.queue.total
