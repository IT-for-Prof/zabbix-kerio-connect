# Zabbix agent2 UserParameter definitions for the Kerio Connect by Zabbix
# agent template. Drop this file into the agent2 include directory on the
# mail-server host (typically /etc/zabbix/zabbix_agent2.d/) and reload
# zabbix-agent2.
#
# Credentials live in /etc/zabbix/kerio_connect.conf (NOT in this file —
# zabbix_agent2.conf does not expand Zabbix host macros).
#
# Required: Timeout=30 (or higher) in /etc/zabbix/zabbix_agent2.conf — the
# UserParameter performs an HTTPS round-trip with login + 4 API calls.

UserParameter=kerio.api.master,/usr/bin/env python3 /opt/zabbix-kerio-connect/src/kerio_collector.py collect /etc/zabbix/kerio_connect.conf
UserParameter=kerio.services.discovery,/usr/bin/env python3 /opt/zabbix-kerio-connect/src/kerio_collector.py lld_services /etc/zabbix/kerio_connect.conf
