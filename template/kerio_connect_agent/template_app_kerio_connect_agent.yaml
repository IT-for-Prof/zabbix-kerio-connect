        - $.statistics.ldapServer.totalIncomingConnections
      - type: CHANGE_PER_SECOND
        parameters:
        - ''
      - type: IN_RANGE
        parameters:
        - '0'
        - '1000000000'
        error_handler: DISCARD_VALUE
    - uuid: d8d84af00f4f44a3b331c89acff19450
      name: 'Kerio Connect: Web connections'
      type: DEPENDENT
      key: kerio.web.connections
      delay: '0'
      value_type: FLOAT
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.statistics.webServer.totalIncomingConnections
      - type: CHANGE_PER_SECOND
        parameters:
        - ''
      - type: IN_RANGE
        parameters:
        - '0'
        - '1000000000'
        error_handler: DISCARD_VALUE
    - uuid: ea545973df05461597b67b35a5768a9e
      name: 'Kerio Connect: XMPP connections'
      type: DEPENDENT
      key: kerio.xmpp.connections
      delay: '0'
      value_type: FLOAT
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.statistics.xmppServer.totalIncomingConnections
      - type: CHANGE_PER_SECOND
        parameters:
        - ''
      - type: IN_RANGE
        parameters:
        - '0'
        - '1000000000'
        error_handler: DISCARD_VALUE
    - uuid: f8d7531bd24c43a5a70e75c290fc0ff7
      name: 'Kerio Connect: Spam messages checked'
      type: DEPENDENT
      key: kerio.spam.checked
      delay: '0'
      value_type: FLOAT
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.statistics.spam.checked
      - type: CHANGE_PER_SECOND
        parameters:
        - ''
      - type: IN_RANGE
        parameters:
        - '0'
        - '1000000000'
        error_handler: DISCARD_VALUE
    - uuid: 2d24db1b90a440ad9a9bbce34fb1ca75
      name: 'Kerio Connect: Spam messages rejected'
      type: DEPENDENT
      key: kerio.spam.rejected
      delay: '0'
      value_type: FLOAT
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.statistics.spam.rejected
      - type: CHANGE_PER_SECOND
        parameters:
        - ''
      - type: IN_RANGE
        parameters:
        - '0'
        - '1000000000'
        error_handler: DISCARD_VALUE
    - uuid: d2e3c1c92435474e86e1b67692f171de
      name: 'Kerio Connect: AV messages scanned'
      type: DEPENDENT
      key: kerio.av.scanned
      delay: '0'
      value_type: FLOAT
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.statistics.antivirus.checkedAttachments
      - type: CHANGE_PER_SECOND
        parameters:
        - ''
      - type: IN_RANGE
        parameters:
        - '0'
        - '1000000000'
        error_handler: DISCARD_VALUE
    - uuid: 1b7eef2c2fda40109cfe134fb2c13eb4
      name: 'Kerio Connect: AV infected messages'
      type: DEPENDENT
      key: kerio.av.infected
      delay: '0'
      value_type: FLOAT
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.statistics.antivirus.foundViruses
      - type: CHANGE_PER_SECOND
        parameters:
        - ''
      - type: IN_RANGE
        parameters:
        - '0'
        - '1000000000'
        error_handler: DISCARD_VALUE
      triggers:
      - uuid: c4494ce53eaa4d9283a5ba55073019d6
        expression: last(/Kerio Connect by Zabbix agent/kerio.av.infected)>0
        name: 'Kerio Connect: Antivirus infection detected'
        priority: HIGH
        manual_close: 'YES'
        description: One or more infected attachments were detected. Check Kerio Connect antivirus logs.
        dependencies:
        - *id001
    - uuid: 3346ab29f5ff407984abae99836b3821
      name: 'Kerio Connect: Greylisting delayed messages'
      type: DEPENDENT
      key: kerio.greylisting.delayed
      delay: '0'
      value_type: FLOAT
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.statistics.greylisting.messagesDelayed
      - type: CHANGE_PER_SECOND
        parameters:
        - ''
      - type: IN_RANGE
        parameters:
        - '0'
        - '1000000000'
        error_handler: DISCARD_VALUE
    - uuid: da5cb21e4667477b9c5a6e6340fbd453
      name: 'Kerio Connect: Antibombing rejected connections'
      type: DEPENDENT
      key: kerio.antibombing.rejected
      delay: '0'
      value_type: FLOAT
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.statistics.antibombing.rejectedConnections
      - type: CHANGE_PER_SECOND
        parameters:
        - ''
      - type: IN_RANGE
        parameters:
        - '0'
        - '1000000000'
        error_handler: DISCARD_VALUE
    - uuid: 76ff865632d84d8c8864a8e134b36f3c
      name: 'Kerio Connect: Licensed users'
      type: DEPENDENT
      key: kerio.license.users
      delay: '0'
      value_type: UNSIGNED
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.license.users
    - uuid: cde7b4e944894e60adf047b0a6616676
      name: 'Kerio Connect: License expiry date'
      type: DEPENDENT
      key: kerio.license.expiry
      delay: '0'
      value_type: UNSIGNED
      units: unixtime
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.license.expirations[?(@.type=="License")].date.first()
    - uuid: 5e22ab4353564337aabfeaf753f79c59
      name: 'Kerio Connect: License days remaining'
      type: DEPENDENT
      key: kerio.license.days
      delay: '0'
      value_type: UNSIGNED
      units: d
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.license.expirations[?(@.type=="License")].remainingDays.first()
      triggers:
      - uuid: d4feb43a01054edca1e86881b91f16f5
        expression: last(/Kerio Connect by Zabbix agent/kerio.license.days)<30
        name: 'Kerio Connect: License expires in less than 30 days'
        priority: WARNING
        description: 'Renew the Kerio Connect license. Current days remaining: {ITEM.VALUE1}.'
        dependencies:
        - *id001
    - uuid: 71bb0756299d433686e1722ec19fe99f
      name: 'Kerio Connect: Server version'
      type: DEPENDENT
      key: kerio.version
      delay: '0'
      trends: '0'
      value_type: TEXT
      master_item:
        key: kerio.api.master
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.server.version
    discovery_rules:
    - uuid: 0458b06db18a40088d0eda9c10ca34a8
      name: 'Kerio Connect: Service discovery'
      type: ZABBIX_ACTIVE
      key: kerio.services.discovery
      delay: 10m
      timeout: 30s
      item_prototypes:
      - uuid: 50d3db28ed68476db1497bdaec2e516f
        name: 'Kerio Connect: Service {#SERVICE} status'
        type: DEPENDENT
        key: kerio.service.status[{#SERVICE}]
        delay: '0'
        value_type: UNSIGNED
        master_item:
          key: kerio.api.master
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.services[?(@.name=="{#SERVICE}")].isRunning.first()
        - type: BOOL_TO_DECIMAL
        trigger_prototypes:
        - uuid: 976e5145f8344785a1e405774bcfeca6
          expression: last(/Kerio Connect by Zabbix agent/kerio.service.status[{#SERVICE}])=0
          name: 'Kerio Connect: Service {#SERVICE} is not running'
          priority: HIGH
          manual_close: 'YES'
          description: Discovered Kerio service is stopped. If this is intentional, add the service to {$KERIO.SERVICES.EXCLUDE} on the host.
          dependencies:
          - *id001
      filter:
        evaltype: AND
        conditions:
        - macro: '{#SERVICE}'
          value: '{$KERIO.SERVICES.EXCLUDE}'
          operator: NOT_MATCHES_REGEX
          formulaid: A
    vendor:
      name: itforprof.com — Konstantin Tyutyunnik
      version: 1.0.0
